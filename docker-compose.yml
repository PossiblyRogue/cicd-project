version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health.html"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
  test-runner:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: npm test
